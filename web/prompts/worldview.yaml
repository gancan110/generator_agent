system: "你是一位专业的小说世界观架构师。请根据小说的题材和风格，结合用户的个人理解和偏好，构建一个完整且自洽的世界观设定。"
user: |
  小说标题：{title}
  题材：{genre}
  主题：{theme}

  {custom_ideas_section}

  请根据以上信息，构建详细的世界观设定，包括：

  1. **世界基础**：时代背景、地理环境、社会结构
  2. **力量体系**：能力等级、修炼/升级路径、限制条件
  3. **社会规则**：权力结构、经济体系、文化习俗
  4. **种族/势力**：主要种族或势力阵营及其特点
  5. **历史背景**：影响当前故事的关键历史事件
  6. **特殊设定**：区别于其他作品的独特世界观元素
  7. **禁忌与代价**：力量的代价、世界的禁忌

  {custom_requirements}
  请确保世界观自洽且有足够的故事展开空间。

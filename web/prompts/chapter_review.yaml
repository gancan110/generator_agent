system: "你是一位专业的小说编辑和质量评审。请对生成的章节进行全面评估并提供改进建议。"
user: |
  小说标题：{title}
  题材：{genre}
  当前章节：第{chapter_number}章

  【本章大纲要求】
  {chapter_outline}

  【生成的章节内容】
  {chapter_content}

  请从以下维度评估本章质量（每项0-20分，满分100）：

  1. **情节推进**（0-20）：是否完成大纲要求的情节，节奏是否合理
  2. **人物塑造**（0-20）：角色行为是否符合人设，对话是否自然
  3. **文笔质量**（0-20）：语言是否流畅，描写是否生动
  4. **连贯性**（0-20）：与前文是否衔接自然，有无逻辑漏洞
  5. **吸引力**（0-20）：是否能吸引读者继续阅读，有无爽点

  请以严格JSON格式输出：
  {{"score": 总分, "pass": true/false, "details": {{"plot": 分数, "character": 分数, "writing": 分数, "coherence": 分数, "engagement": 分数}}, "issues": ["问题1", "问题2"], "suggestions": ["建议1", "建议2"]}}

  评分标准：总分>=70为通过，<70需要重新生成。

system: "你是一位专业的小说大纲策划师。请根据小说的世界观、风格和技巧指南，结合用户设定的参数，生成一份详细的小说大纲。"
user: |
  小说标题：{title}
  题材：{genre}
  主题：{theme}

  【世界观设定】
  {worldview}

  【题材分析】
  {knowledge}

  {custom_ideas_section}

  【悬念引擎参数】
  {suspense_config}

  请生成详细的小说大纲，共{chapter_count}章：

  1. **整体框架**：故事主线、核心冲突、最终结局
  2. **卷/篇划分**：分为几卷，每卷的主题和目标
  3. **章节大纲**：每章的核心事件和转折点
  4. **人物弧光**：主角的成长路线和关键转折
  5. **伏笔清单**：需要埋设的伏笔和预计回收章节
  6. **爽点分布**：关键爽点和高潮章节安排

  {custom_requirements}
  请确保大纲结构清晰，节奏合理，有足够的故事张力。

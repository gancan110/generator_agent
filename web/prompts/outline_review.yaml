system: "你是一位专业的小说大纲审核编辑。请对生成的小说大纲进行质量评估和打分。"
user: |
  小说标题：{title}
  题材：{genre}

  【待审核的大纲】
  {outline_content}

  请从以下维度评估大纲质量（每项0-20分，满分100）：

  1. **结构完整性**（0-20）：是否有清晰的开头、发展、高潮、结局
  2. **情节张力**（0-20）：冲突设置是否合理，是否有足够的悬念和反转
  3. **人物塑造**（0-20）：角色是否有成长弧光，动机是否合理
  4. **节奏把控**（0-20）：章节分布是否合理，是否有张弛有度
  5. **独创性**（0-20）：是否有区别于其他作品的独特卖点

  请以严格JSON格式输出：
  {{"score": 总分, "pass": true/false, "details": {{"structure": 分数, "tension": 分数, "characters": 分数, "pacing": 分数, "originality": 分数}}, "issues": ["问题1", "问题2"], "suggestions": ["建议1", "建议2"]}}

  评分标准：总分>=70为通过，<70需要重新生成。
